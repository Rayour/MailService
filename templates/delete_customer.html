{% extends 'base.html' %}

{% block title %}Подтверждение удаления клиента{% endblock %}

{% block page_title %}
Удаление клиента
{% endblock %}

{% block content %}
<div class="row text-start">
    <div class="col-lg-6 col-md-8 col-s-12 mx-auto">
        <div class="mb-4">
            <p>Вы действительно хотите удалить клиента <b>"{{ customer.full_name }}"</b>?.</p>
            <form method="post" class="form-floating">
                {% csrf_token %}
                <button type="submit" class="btn btn-lg btn-block btn-secondary">Удалить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
