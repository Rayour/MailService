{% extends 'base.html' %}

{% block title %}Письмо{% endblock %}

{% block page_title %}
Информация о письма
{% endblock %}

{% block content %}
<div class="row text-start">
    <div class="col-lg-6 col-md-8 col-s-12 mx-auto">
        <div class="mb-4">
            <form method="post" class="form-floating">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-lg btn-block btn-secondary">Сохранить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
